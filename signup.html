<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- meta tags for search engine-->
    <meta name="discription"
        content="Love Running. Club for runners in Dublin, Ireland. Urban running, trail running. Dublin docklands and Phoenix Park">
    <meta name="keywords" content="love running, run, running club, runners, Ireland, Dublin, sport, exercise">
    <!-- Title -->
    <title>Love Running</title>
    <!-- Favicon-->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <!-- Stylesheet -->
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header>
        <a href="index.html">
            <h1 id="logo">Love Running</h1>
        </a>
        <input type="checkbox" id="nav-toggle" name="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label"><img src="assets/icon/line-three-horizontal-lined.png"
                alt="CLik to show the navbar"></label>
        <nav>
            <ul id="menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="gallery.html">Gallery</a> </li>
                <li><a href="signup.html">Sign Up</a> </li>
            </ul>
        </nav>
    </header>

    <!-- Main -->
    <main id="signup">
        <form id="signup-form"  action="https://formdump.codeinstitute.net"  method="post">
            <h2><i class="fa-solid fa-heart-pulse"></i>Let's get you signed up! </h2>
            <!-- name and email-->
            <div id="person-details">
                <label for="fname">First Name</label><br>
                <input type="text" id="fname" name="fname" required>
                <br>
                <label for="lname">Last Name</label><br>
                <input type="text" id="lname" name="lname" required>
                <br>
                <label for="email">Email Address</label><br>
                <input type="email" id="email" name="email" required>
            </div>

            <br>
            <div id="running-choice">
                <label>
                    <input type="radio" name="running-choice" value="Road" required>
                    Road
                </label>

                <label>
                    <input type="radio" name="running-choice" value="Trail" required>
                    Trail
                </label>

                <label>
                    <input type="radio" name="running-choice" value="Both" required>
                    Both
                </label>
            </div>
            
            <button type="submit" class="join-button">Let's Run!</button>



        </form>
    </main>


    <!-- Footer -->
    <footer>
        <!-- Facebook ,X,Instagram icon with link-->
        <ul id="social-network">
            <li><a href="https://www.facebook.com/" target="_blank" rel="noopener"
                    aria-label="Visit our Facebook page(opens in a new tab)"><img src="assets/icon/facebook.jpg"
                        alt="Facebook Icon"></a></li>

            <li><a href="https://x.com/" target="_blank" rel="noopener"
                    aria-label="Visit our X page(opens in a new tab)"><img src="assets/icon/x.jpg" alt="X Icon"></a>
            </li>

            <li><a href="https://www.instagram.com/" target="_blank" rel="noopener"
                    aria-label="Visit our Instagram page(opens in a new tab)"><img src="assets/icon/instagram.png"
                        alt="Instagram Icon"></a></li>

            <li><a href="https://www.youtube.com/" target="_blank" rel="noopener"
                    aria-label="Visit our Youtube page(opens in a new tab)"><img src="assets/icon/youtube.png"
                        alt="Youtube Icon"></a></li>
        </ul>
    </footer>
    <!--- font awsome-->
    <script src="https://kit.fontawesome.com/68e551a4bc.js" crossorigin="anonymous"></script>
</body>

</html>
